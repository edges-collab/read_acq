name: Tests

# Test on all pushes, except when the push is literally just a tag (because we
# tag automatically via CI, and therefore there's no extra code in that push).
on:
  push:
    tags-ignore:
      - 'v*'
  pull_request:

jobs:
  tests:
    env:
      ENV_NAME: tests
      PYTHON: ${{ matrix.python-version }}
      OS: ${{ matrix.os }}
    name: Testing
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # - name: Install uv
      #   uses: astral-sh/setup-uv@v7
      #   with:
      #     enable-cache: true

      - name: Install dependencies
        # Need pip install because mesonpy backend doesn't work with uv:
        # https://github.com/astral-sh/uv/issues/10214
        run: python -m pip install --group dev .

      - name: Run Tests
        run: |
          python -m pytest -n auto

      - name: Run Tests
        run: |
          coverage run --parallel-mode -m pytest

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-tests-${{ matrix.os }}-${{ matrix.python-version }}
          path: ".coverage.*"
          if-no-files-found: error
          include-hidden-files: true

  downstream:
    env:
      PYTHON: 3.13
      OS: ubuntu-latest
    name: Downstream
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ['edges-analysis']
      fail-fast: false
    steps:
      - uses: actions/checkout@master
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON }}
      - uses: astral-sh/setup-uv@v7
      - name: set PY
        run: echo "PY=$(python -c 'import hashlib, sys;print(hashlib.sha256(sys.version.encode()+sys.executable.encode()).hexdigest())')" >> $GITHUB_ENV
      - name: Setup Environment
        run: |
          pip install -U coverage
          pip install --group dev .
      - name: Get downstream package
        run: |
          cd ..
          git clone https://github.com/edges-collab/${{ matrix.package }}
          cd ${{ matrix.package }}
          # Constrain to the exact versions in the downstream package's own
          # uv.lock (what its own CI verifies works), instead of letting pip
          # resolve arbitrary latest versions of its test dependencies. This
          # avoids spurious downstream failures when a transitive test
          # dependency (e.g. pytest_cases) publishes a release that's
          # incompatible with the latest pytest. See
          # https://github.com/smarie/python-pytest-cases/issues/385
          uv export --locked --all-groups --no-hashes --no-emit-project --no-emit-workspace -o /tmp/downstream-constraints.txt
          pip install --group dev . -c /tmp/downstream-constraints.txt
      - name: Print Versions
        run: pip freeze | grep -E "edges-|read_acq"

      - name: Run Tests
        run: |
          coverage run --parallel-mode -m pytest ../${{ matrix.package}}

      - name: Upload coverage data
        uses: actions/upload-artifact@v7
        with:
          name: coverage-data-downstream-${{ matrix.package }}
          path: ".coverage.*"
          if-no-files-found: error
          include-hidden-files: true

  codecov:
    needs: [downstream, tests]
    name: Codecov Reporting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download coverage data.
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-data-*
          merge-multiple: true

      - uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install coverage
        run: pip install coverage

      - run: pip install .[dev]

      - name: Combine/Report
        run: |
          coverage combine
          coverage xml

      - uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          verbose: true
          files: "./coverage.xml"
          token: ${{ secrets.CODECOV_TOKEN }}
